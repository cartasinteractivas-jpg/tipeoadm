<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pro - DocuFácil</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #fff; padding: 20px; }
        
        .header { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #9b59b6; display: flex; justify-content: space-between; align-items: center; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .tab-btn { background: transparent; color: #888; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { color: #fff; background: #9b59b6; }

        .panel { display: none; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        .panel.active { display: flex; gap: 20px; }

        /* Panel Izquierdo: Configuración */
        .config-side { width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { color: #ccc; font-size: 13px; font-weight: bold; }
        .input-group input, .input-group select, .input-group textarea { padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; outline: none; }
        
        .btn { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #9b59b6; color: white; }
        .btn-success { background: #2ecc71; color: #000; }
        .btn-danger { background: #e74c3c; color: white; }

        /* Panel Derecho: Lienzo */
        .canvas-side { flex: 1; background: #222; border-radius: 8px; border: 1px solid #444; display: flex; justify-content: center; padding: 20px; overflow: auto; position: relative; min-height: 600px; }
        .canvas-wrapper { position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5 ); }
        #main-canvas { display: block; }
        #draw-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; z-index: 10; }

        /* Lista de Formatos */
        .formatos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; width: 100%; }
        .formato-card { background: #2a2a2a; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .formato-card h3 { color: #f1c40f; margin-bottom: 10px; }
        .formato-actions { display: flex; gap: 10px; margin-top: 10px; }

        /* Lista de Áreas */
        .areas-lista { list-style: none; margin-top: 10px; }
        .area-item { background: #2c3e50; padding: 8px; border-radius: 4px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛠️ Admin Pro: Arquitecto de Formatos</h1>
        <span id="status-db" style="color: #2ecc71;">Conectado</span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('lista')">📋 Mis Formatos</button>
        <button class="tab-btn" onclick="switchTab('creador')">➕ Crear Nuevo Formato</button>
    </div>

    <!-- PESTAÑA: LISTA DE FORMATOS -->
    <div id="panel-lista" class="panel active" style="flex-direction: column;">
        <div class="formatos-grid" id="formatos-container">
            <!-- Se llena con JS -->
        </div>
    </div>

    <!-- PESTAÑA: CREADOR VISUAL -->
    <div id="panel-creador" class="panel">
        <div class="config-side">
            <div class="input-group">
                <label>Nombre del Formato</label>
                <input type="text" id="fmt-nombre" placeholder="Ej: Solicitud de Vacaciones">
            </div>
            <div class="input-group">
                <label>Categoría</label>
                <select id="fmt-categoria">
                    <option value="carta">Carta</option>
                    <option value="solicitud">Solicitud</option>
                    <option value="contrato">Contrato</option>
                    <option value="curriculum">Curriculum</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="input-group">
                <label>Subir Modelo (PDF, JPG, PNG)</label>
                <input type="file" id="file-upload" accept="application/pdf,image/*">
            </div>

            <div id="config-areas" style="display: none;">
                <h3 style="border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 10px;">Marcar Áreas</h3>
                <p style="font-size: 11px; color: #aaa;">Dibuja un cuadro y elige qué parte es:</p>
                <ul class="areas-lista" id="lista-areas"></ul>
            </div>

            <button class="btn btn-success" onclick="guardarFormato()" style="margin-top: 20px;">💾 Guardar Formato</button>
        </div>

        <div class="canvas-side">
            <div class="canvas-wrapper" id="canvas-wrapper" style="display: none;">
                <canvas id="main-canvas"></canvas>
                <canvas id="draw-canvas"></canvas>
            </div>
            <div id="msg-vacio" style="color: #666; margin-top: 100px;">Sube un archivo para empezar.</div>
        </div>
    </div>

    <!-- MODAL PARA ELEGIR TIPO DE ÁREA -->
    <div id="modal-area" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;">
        <div style="background: #222; padding: 20px; border-radius: 10px; width: 300px;">
            <h3 style="margin-bottom: 15px; text-align: center;">¿Qué área es esta?</h3>
            <select id="select-tipo-area" style="width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; margin-bottom: 15px;">
                <option value="fecha">📅 Fecha</option>
                <option value="remitente">👤 Datos Remitente</option>
                <option value="destinatario">🏢 Datos Destinatario</option>
                <option value="cuerpo">📝 Cuerpo del Texto (IA)</option>
                <option value="firma">✍️ Área de Firma</option>
                <option value="otro">🔹 Otro Dato</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-danger" style="flex: 1;" onclick="cancelarArea()">Cancelar</button>
                <button class="btn btn-success" style="flex: 1;" onclick="confirmarArea()">Aceptar</button>
            </div>
        </div>
    </div>
<script>
    // ==========================================
    // 1. CONFIGURACIÓN DE SUPABASE
    // ==========================================
    const supabaseUrl = 'TU_SUPABASE_URL'; // Pon tu URL real
    const supabaseKey = 'TU_SUPABASE_KEY'; // Pon tu KEY real
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // ==========================================
    // 2. VARIABLES GLOBALES
    // ==========================================
    let currentFileBase64 = null;
    let currentFileType = null; // 'pdf' o 'image'
    let areasMarcadas = [];
    
    // Variables para dibujar
    let isDrawing = false;
    let startX, startY;
    let tempRect = null;

    const mainCanvas = document.getElementById('main-canvas');
    const drawCanvas = document.getElementById('draw-canvas');
    const ctxDraw = drawCanvas.getContext('2d');

    // ==========================================
    // 3. NAVEGACIÓN ENTRE PESTAÑAS
    // ==========================================
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        
        if(tab === 'lista') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('panel-lista').classList.add('active');
            cargarFormatos();
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('panel-creador').classList.add('active');
        }
    }

    // ==========================================
    // 4. CARGA DE ARCHIVOS (PDF O IMAGEN)
    // ==========================================
    document.getElementById('file-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (event) => {
            currentFileBase64 = event.target.result;
            document.getElementById('msg-vacio').style.display = 'none';
            document.getElementById('canvas-wrapper').style.display = 'block';
            document.getElementById('config-areas').style.display = 'block';
            
            if (file.type === 'application/pdf') {
                currentFileType = 'pdf';
                await renderPDF(event.target.result);
            } else {
                currentFileType = 'image';
                renderImage(event.target.result);
            }
        };
        reader.readAsDataURL(file);
    });

    async function renderPDF(dataUrl) {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        const base64Data = dataUrl.split(',' )[1];
        const binaryData = atob(base64Data);
        const array = new Uint8Array(binaryData.length);
        for (let i = 0; i < binaryData.length; i++) { array[i] = binaryData.charCodeAt(i); }
        
        const pdf = await pdfjsLib.getDocument({ data: array }).promise;
        const page = await pdf.getPage(1); // Solo la primera hoja para el modelo
        const viewport = page.getViewport({ scale: 1.5 });
        
        setupCanvases(viewport.width, viewport.height);
        const ctx = mainCanvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    }

    function renderImage(dataUrl) {
        const img = new Image();
        img.onload = () => {
            let width = img.width;
            let height = img.height;
            const maxWidth = 800; // Límite para que no sea gigante en pantalla
            if (width > maxWidth) {
                height = height * (maxWidth / width);
                width = maxWidth;
            }
            setupCanvases(width, height);
            const ctx = mainCanvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
        };
        img.src = dataUrl;
    }

    function setupCanvases(w, h) {
        mainCanvas.width = drawCanvas.width = w;
        mainCanvas.height = drawCanvas.height = h;
        areasMarcadas = [];
        redibujarAreas();
    }

    // ==========================================
    // 5. MOTOR DE DIBUJO DE ÁREAS
    // ==========================================
    drawCanvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        const rect = drawCanvas.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
    });

    drawCanvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const rect = drawCanvas.getBoundingClientRect();
        const currentX = e.clientX - rect.left;
        const currentY = e.clientY - rect.top;
        
        tempRect = {
            x: Math.min(startX, currentX),
            y: Math.min(startY, currentY),
            w: Math.abs(currentX - startX),
            h: Math.abs(currentY - startY)
        };
        
        redibujarAreas();
        ctxDraw.strokeStyle = '#2ecc71';
        ctxDraw.lineWidth = 2;
        ctxDraw.strokeRect(tempRect.x, tempRect.y, tempRect.w, tempRect.h);
    });

    drawCanvas.addEventListener('mouseup', () => {
        if (!isDrawing) return;
        isDrawing = false;
        
        // Si el cuadro es muy pequeño, fue un clic por error
        if (tempRect && tempRect.w > 20 && tempRect.h > 20) {
            document.getElementById('modal-area').style.display = 'flex';
        } else {
            tempRect = null;
            redibujarAreas();
        }
    });

    // ==========================================
    // 6. MODAL Y GESTIÓN DE ÁREAS
    // ==========================================
    function cancelarArea() {
        document.getElementById('modal-area').style.display = 'none';
        tempRect = null;
        redibujarAreas();
    }

    function confirmarArea() {
        const select = document.getElementById('select-tipo-area');
        const tipo = select.value;
        const nombreTipo = select.options[select.selectedIndex].text;
        
        areasMarcadas.push({ ...tempRect, tipo: tipo, nombre: nombreTipo });
        
        document.getElementById('modal-area').style.display = 'none';
        tempRect = null;
        redibujarAreas();
        actualizarListaAreas();
    }

    function redibujarAreas() {
        ctxDraw.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        areasMarcadas.forEach(area => {
            ctxDraw.strokeStyle = '#9b59b6';
            ctxDraw.lineWidth = 2;
            ctxDraw.fillStyle = 'rgba(155, 89, 182, 0.2)';
            ctxDraw.fillRect(area.x, area.y, area.w, area.h);
            ctxDraw.strokeRect(area.x, area.y, area.w, area.h);
            
            ctxDraw.fillStyle = '#fff';
            ctxDraw.font = 'bold 14px Arial';
            ctxDraw.fillText(area.nombre, area.x + 5, area.y + 20);
        });
    }

    function actualizarListaAreas() {
        const lista = document.getElementById('lista-areas');
        lista.innerHTML = '';
        areasMarcadas.forEach((area, index) => {
            lista.innerHTML += `
                <li class="area-item">
                    <span>${area.nombre}</span>
                    <button class="btn-danger" style="padding: 2px 6px; border:none; border-radius:3px; cursor:pointer;" onclick="borrarArea(${index})">✖</button>
                </li>
            `;
        });
    }

    function borrarArea(index) {
        areasMarcadas.splice(index, 1);
        redibujarAreas();
        actualizarListaAreas();
    }

    // ==========================================
    // 7. GUARDAR Y CARGAR FORMATOS (SUPABASE)
    // ==========================================
    async function guardarFormato() {
        const nombre = document.getElementById('fmt-nombre').value.trim();
        const categoria = document.getElementById('fmt-categoria').value;
        
        if (!nombre) return alert("Ponle un nombre al formato.");
        if (!currentFileBase64) return alert("Sube un modelo (PDF o Imagen).");
        if (areasMarcadas.length === 0) return alert("Marca al menos un área en el documento.");

        const configuracion = {
            fondo: currentFileBase64,
            tipoFondo: currentFileType,
            areas: areasMarcadas
        };

        try {
            const { error } = await supabase.from('plantillas').insert([{
                nombre: nombre,
                tipo: 'inteligente', // Etiqueta clave para la nueva App Cliente
                descripcion: categoria,
                configuracion: configuracion
            }]);

            if (error) throw error;
            alert("✅ Formato guardado con éxito.");
            
            // Limpiar y volver a la lista
            document.getElementById('fmt-nombre').value = '';
            document.getElementById('file-upload').value = '';
            document.getElementById('canvas-wrapper').style.display = 'none';
            document.getElementById('config-areas').style.display = 'none';
            document.getElementById('msg-vacio').style.display = 'block';
            currentFileBase64 = null;
            areasMarcadas = [];
            actualizarListaAreas();
            
            switchTab('lista');
            
        } catch (err) {
            alert("Error al guardar: " + err.message);
        }
    }

    async function cargarFormatos() {
        const { data, error } = await supabase.from('plantillas').select('*').eq('tipo', 'inteligente').order('created_at', { ascending: false });
        if (error) return console.error(error);
        
        const container = document.getElementById('formatos-container');
        container.innerHTML = '';
        
        if(data.length === 0) {
            container.innerHTML = '<p style="color:#888;">No has creado ningún formato inteligente aún.</p>';
            return;
        }

        data.forEach(fmt => {
            container.innerHTML += `
                <div class="formato-card">
                    <h3>${fmt.nombre}</h3>
                    <p style="color:#aaa; font-size:13px; margin-bottom:5px;">Categoría: <span style="color:#fff; text-transform:capitalize;">${fmt.descripcion}</span></p>
                    <p style="color:#aaa; font-size:13px;">Áreas marcadas: <span style="color:#fff; font-weight:bold;">${fmt.configuracion.areas.length}</span></p>
                    <div class="formato-actions">
                        <button class="btn btn-danger" style="flex:1; padding:8px;" onclick="borrarFormato(${fmt.id})">🗑️ Borrar</button>
                    </div>
                </div>
            `;
        });
    }

    async function borrarFormato(id) {
        if(!confirm("¿Seguro que deseas borrar este formato?")) return;
        await supabase.from('plantillas').delete().eq('id', id);
        cargarFormatos();
    }

    // Iniciar cargando la lista
    cargarFormatos();
</script>
</body>
</html>
