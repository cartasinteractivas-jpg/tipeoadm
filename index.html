<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - DocuFácil</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding-bottom: 40px; }
        
        /* --- HEADER Y TABS --- */
        .header { background: #1a1a1a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2a2a2a; flex-wrap: wrap; gap: 10px; }
        .header h1 { color: #b87333; font-size: 20px; display: flex; align-items: center; gap: 8px; color: #c27ba0; }
        .status-badge { background: #2ecc71; color: #000; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        .tabs { display: flex; gap: 10px; padding: 15px 20px; background: #1a1a1a; border-bottom: 1px solid #333; overflow-x: auto; }
        .tab { background: transparent; color: #aaa; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 6px; white-space: nowrap; }
        .tab.active { background: #8e44ad; color: white; }

        /* --- PANELES --- */
        .panel { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .panel.active { display: block; }

        /* --- FORMULARIO CREAR CÓDIGO --- */
        .card-form { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 200px; }
        .input-group label { color: #ccc; font-size: 13px; font-weight: bold; }
        .input-group input { padding: 12px; background: #000; color: #fff; border: 1px solid #444; border-radius: 6px; outline: none; font-size: 15px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; justify-content: center; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-purple { background: #9b59b6; color: white; }
        .btn-green { background: #2ecc71; color: black; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-blue { background: #3498db; color: white; }
        .btn-orange { background: #e67e22; color: white; }

        /* --- TABLA RESPONSIVA --- */
        .table-container { background: #1e1e1e; border-radius: 8px; border: 1px solid #333; overflow: hidden; }
        .table-header { padding: 15px 20px; border-bottom: 1px solid #333; }
        .table-header h2 { color: #f1c40f; font-size: 18px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #f1c40f; font-size: 14px; background: #222; }
        td { color: #fff; font-size: 14px; }
        
        .codigo-text { color: #c27ba0; font-weight: bold; font-size: 16px; }
        .creditos-badge { background: #2ecc71; color: #000; padding: 4px 12px; border-radius: 12px; font-weight: bold; display: inline-block; }
        
        .acciones-cell { display: flex; gap: 8px; flex-wrap: wrap; }

        /* Magia CSS para que la tabla se vea bien en celulares */
        @media (max-width: 768px ) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border-bottom: 2px solid #444; padding: 10px 0; }
            td { border: none; position: relative; padding-left: 40%; text-align: right; padding-top: 10px; padding-bottom: 10px; }
            td:before { position: absolute; left: 15px; width: 35%; padding-right: 10px; white-space: nowrap; content: attr(data-label); text-align: left; font-weight: bold; color: #aaa; }
            .acciones-cell { justify-content: flex-end; }
            .card-form { flex-direction: column; }
            .input-group, .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛠️ Admin: Generador de Documentos</h1>
        <div class="status-badge">✅ BD Conectada</div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('codigos')">🎟️ Gestión de Códigos</button>
        <button class="tab" onclick="switchTab('plantillas')">📄 Creador de Plantillas</button>
    </div>

    <!-- PANEL: GESTIÓN DE CÓDIGOS -->
    <div id="panel-codigos" class="panel active">
        
        <div class="card-form">
            <div class="input-group" style="flex: 2;">
                <label>Nuevo Código (Para el cliente)</label>
                <input type="text" id="input-nuevo-codigo" placeholder="Ej: JUAN-123" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '')">
            </div>
            <button class="btn btn-purple" onclick="generarCodigoAleatorio()">🎲 Aleatorio</button>
            
            <div class="input-group" style="flex: 1;">
                <label>Créditos (Hojas)</label>
                <input type="number" id="input-creditos" value="5" min="1">
            </div>
            <button class="btn btn-green" onclick="crearCodigo()">➕ Crear Código</button>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>Códigos Activos</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Créditos Disponibles</th>
                        <th>Fecha de Creación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-codigos">
                    <!-- Se llena con JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- PANEL: PLANTILLAS (Placeholder) -->
    <div id="panel-plantillas" class="panel">
        <div class="card-form">
            <h2 style="color: #ccc;">Próximamente: Creador de Plantillas</h2>
        </div>
    </div>

<script>
    // ==========================================
    // 1. CONFIGURACIÓN SUPABASE
    // ==========================================
    const supabaseUrl = 'https://wpzddhmllctdsiuxenss.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwemRkaG1sbGN0ZHNpdXhlbnNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjUyNzQsImV4cCI6MjA5OTU0MTI3NH0.hwSxJ3Sk_RlgbvFyr8S64XRuxW7j55BU4gaIneFTuhY';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

    // Cargar códigos al iniciar
    document.addEventListener('DOMContentLoaded', () => {
        cargarCodigos();
    });

    // ==========================================
    // 2. NAVEGACIÓN (TABS)
    // ==========================================
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('panel-' + tabId).classList.add('active');
    }

    // ==========================================
    // 3. GESTIÓN DE CÓDIGOS
    // ==========================================
    function generarCodigoAleatorio() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = 'DOC-';
        for (let i = 0; i < 5; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('input-nuevo-codigo').value = result;
    }

    async function cargarCodigos() {
        const { data, error } = await supabase
            .from('usuarios_codigos')
            .select('*')
            .order('created_at', { ascending: false });
            
        if (error) {
            console.error(error);
            return;
        }
        
        const tbody = document.getElementById('tabla-codigos');
        tbody.innerHTML = '';
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888;">No hay códigos creados aún.</td></tr>';
            return;
        }
        
        data.forEach(row => {
            const fecha = new Date(row.created_at).toLocaleString('es-PE');
            tbody.innerHTML += `
                <tr>
                    <td data-label="Código"><span class="codigo-text">${row.codigo}</span></td>
                    <td data-label="Créditos Disponibles"><span class="creditos-badge">${row.creditos}</span></td>
                    <td data-label="Fecha de Creación">${fecha}</td>
                    <td data-label="Acciones" class="acciones-cell">
                        <button class="btn btn-blue" onclick="compartirCodigo('${row.codigo}')">📤 Compartir</button>
                        <button class="btn btn-orange" onclick="recargarCodigo(${row.id}, ${row.creditos})">🔋 Recargar</button>
                        <button class="btn btn-red" onclick="eliminarCodigo(${row.id})">🗑️ Eliminar</button>
                    </td>
                </tr>
            `;
        });
    }

    async function crearCodigo() {
        const codigo = document.getElementById('input-nuevo-codigo').value.trim();
        const creditos = parseInt(document.getElementById('input-creditos').value);
        
        if (!codigo) return alert('Por favor, ingresa un código.');
        if (isNaN(creditos) || creditos <= 0) return alert('La cantidad de créditos debe ser mayor a 0.');
        
        const btn = event.target;
        btn.innerText = "⏳ Creando...";
        btn.disabled = true;

        const { error } = await supabase.from('usuarios_codigos').insert([{ codigo, creditos }]);
        
        btn.innerText = "➕ Crear Código";
        btn.disabled = false;

        if (error) {
            if(error.code === '23505') alert('❌ Ese código ya existe. Intenta con otro.');
            else alert('❌ Error al crear código: ' + error.message);
            return;
        }
        
        document.getElementById('input-nuevo-codigo').value = '';
        cargarCodigos();
    }

    async function eliminarCodigo(id) {
        if (!confirm('⚠️ ¿Estás seguro de que deseas eliminar este código permanentemente?')) return;
        
        const { error } = await supabase.from('usuarios_codigos').delete().eq('id', id);
        if (error) return alert('Error al eliminar el código.');
        
        cargarCodigos();
    }

    // --- NUEVAS FUNCIONES ---

    async function recargarCodigo(id, creditosActuales) {
        const cantidadStr = prompt(`¿Cuántos créditos deseas SUMAR a este código?\n(Actualmente tiene ${creditosActuales} créditos)`, "5");
        
        if (cantidadStr === null) return; // El usuario canceló
        
        const cantidad = parseInt(cantidadStr);
        if (isNaN(cantidad) || cantidad <= 0) return alert('❌ Cantidad inválida. Debes ingresar un número mayor a 0.');
        
        const nuevosCreditos = creditosActuales + cantidad;
        
        const { error } = await supabase.from('usuarios_codigos').update({ creditos: nuevosCreditos }).eq('id', id);
        
        if (error) return alert('❌ Error al recargar los créditos.');
        
        alert(`✅ ¡Recarga exitosa! El código ahora tiene ${nuevosCreditos} créditos.`);
        cargarCodigos();
    }

    function compartirCodigo(codigo) {
        const mensaje = `¡Hola! Aquí tienes tu código para DocuFácil: *${codigo}*\n\nIngresa a la aplicación, coloca tu código y empieza a generar tus documentos al instante. 📄✨`;
        
        // Intentar copiar al portapapeles
        navigator.clipboard.writeText(mensaje).then(() => {
            // Preguntar si desea abrir WhatsApp
            const urlWa = `https://wa.me/?text=${encodeURIComponent(mensaje )}`;
            if(confirm('✅ Código y mensaje copiados al portapapeles.\n\n¿Deseas abrir WhatsApp para enviarlo ahora mismo?')) {
                window.open(urlWa, '_blank');
            }
        }).catch(err => {
            // Fallback por si el navegador bloquea el portapapeles
            alert(`Tu código es: ${codigo}\n\n(Cópialo manualmente)`);
        });
    }
</script>
</body>
</html>
