<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pro - DocuFácil</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <!-- PDF.js para renderizar el PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 20px; display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: #1e1e1e; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #9b59b6; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #9b59b6; font-size: 22px; }

        /* Pestañas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .tab-btn { background: transparent; color: #888; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .tab-btn:hover { color: #fff; background: #222; }
        .tab-btn.active { color: #fff; background: #9b59b6; }
        
        .tab-content { display: none; flex: 1; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* Estilos Generales */
        .panel { background: #1e1e1e; padding: 20px; border-radius: 8px; overflow-y: auto; }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .input-group label { color: #ccc; font-weight: bold; font-size: 13px; }
        .input-group input, .input-group select, .input-group textarea { padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; outline: none; }
        
        .btn-primary { background: #9b59b6; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-success { background: #2ecc71; color: #000; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Tabla de Códigos */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #222; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        th { background: #333; color: #f1c40f; }

        /* Creador Visual */
        .panel-izquierdo { width: 350px; background: #1e1e1e; padding: 20px; border-radius: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .panel-derecho { flex: 1; background: #222; border-radius: 8px; border: 1px solid #444; display: flex; justify-content: center; align-items: flex-start; overflow: auto; padding: 20px; position: relative; margin-left: 20px; }
        .canvas-container { position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.5 ); }
        #draw-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; z-index: 10; }

        /* Lista de Formatos */
        .formatos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; width: 100%; }
        .formato-card { background: #2a2a2a; padding: 15px; border-radius: 8px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛠️ Admin Pro: DocuFácil</h1>
        <span style="color: #2ecc71; font-weight: bold;" id="status-db">Conectando...</span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('tab-codigos', this)">🎟️ Gestión de Códigos</button>
        <button class="tab-btn" onclick="openTab('tab-lista', this)">📋 Mis Formatos</button>
        <button class="tab-btn" onclick="openTab('tab-creador', this)">➕ Arquitecto de Formatos</button>
    </div>

    <!-- PESTAÑA 1: GESTIÓN DE CÓDIGOS (RESTAURADA) -->
    <div id="tab-codigos" class="tab-content active" style="flex-direction: column;">
        <div class="panel" style="display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;">
            <div class="input-group" style="flex: 1; min-width: 200px;">
                <label>Nuevo Código</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="nuevo-codigo" placeholder="Ej: JUAN-123" style="flex: 1;">
                    <button class="btn-primary" onclick="generarCodigoRandom()">🎲 Aleatorio</button>
                </div>
            </div>
            <div class="input-group" style="width: 150px;">
                <label>Créditos</label>
                <input type="number" id="nuevo-creditos" value="5" min="1">
            </div>
            <button class="btn-success" onclick="crearCodigo()" style="height: 42px; margin-bottom: 15px;">➕ Crear Código</button>
        </div>
        <div class="panel" style="flex: 1; margin-top: 20px;">
            <table>
                <thead>
                    <tr><th>Código</th><th>Créditos</th><th>Fecha</th><th>Acciones</th></tr>
                </thead>
                <tbody id="tabla-codigos"></tbody>
            </table>
        </div>
    </div>

    <!-- PESTAÑA 2: MIS FORMATOS (NUEVA) -->
    <div id="tab-lista" class="tab-content" style="flex-direction: column;">
        <div class="panel">
            <div class="formatos-grid" id="formatos-container"></div>
        </div>
    </div>

    <!-- PESTAÑA 3: ARQUITECTO DE FORMATOS (MEJORADA) -->
    <div id="tab-creador" class="tab-content">
        <div class="panel-izquierdo">
            <div class="input-group">
                <label>Nombre del Formato</label>
                <input type="text" id="fmt-nombre" placeholder="Ej: Solicitud de Vacaciones">
            </div>
            <div class="input-group">
                <label>Categoría</label>
                <select id="fmt-categoria">
                    <option value="carta">Carta</option>
                    <option value="solicitud">Solicitud</option>
                    <option value="contrato">Contrato</option>
                    <option value="curriculum">Curriculum</option>
                </select>
            </div>
            <div class="input-group">
                <label>Subir Modelo (PDF, JPG, PNG)</label>
                <input type="file" id="file-upload" accept="application/pdf,image/*">
            </div>
            <div id="config-areas" style="display: none;">
                <h3 style="color: #fff; border-bottom: 1px solid #444; padding-bottom: 5px;">Áreas Marcadas</h3>
                <ul id="lista-areas" style="list-style:none; margin-top:10px;"></ul>
            </div>
            <button class="btn-success" onclick="guardarFormato()" style="margin-top: 20px;">💾 Guardar Formato</button>
        </div>
        <div class="panel-derecho">
            <div class="canvas-container" id="canvas-wrapper" style="display: none;">
                <canvas id="main-canvas"></canvas>
                <canvas id="draw-canvas"></canvas>
            </div>
            <div id="msg-vacio" style="color: #666; margin-top: 100px;">Sube un archivo para empezar.</div>
        </div>
    </div>

    <!-- MODAL DE ÁREAS -->
    <div id="modal-area" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center;">
        <div style="background: #222; padding: 20px; border-radius: 10px; width: 300px;">
            <h3 style="margin-bottom: 15px; text-align: center;">¿Qué área es esta?</h3>
            <select id="select-tipo-area" style="width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; margin-bottom: 15px;">
                <option value="fecha">📅 Fecha</option>
                <option value="remitente">👤 Datos Remitente</option>
                <option value="destinatario">🏢 Datos Destinatario</option>
                <option value="cuerpo">📝 Cuerpo del Texto (IA)</option>
                <option value="firma">✍️ Área de Firma</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <button class="btn-danger" style="flex: 1;" onclick="cancelarArea()">Cancelar</button>
                <button class="btn-success" style="flex: 1;" onclick="confirmarArea()">Aceptar</button>
            </div>
        </div>
    </div>
<script>
    // ==========================================
    // 1. CONFIGURACIÓN DE SUPABASE
    // ==========================================
    const supabaseUrl = 'https://wpzddhmllctdsiuxenss.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwemRkaG1sbGN0ZHNpdXhlbnNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjUyNzQsImV4cCI6MjA5OTU0MTI3NH0.hwSxJ3Sk_RlgbvFyr8S64XRuxW7j55BU4gaIneFTuhY';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

    // Configurar el Worker de PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // ==========================================
    // 2. INICIO Y PESTAÑAS
    // ==========================================
    async function init( ) {
        const { data, error } = await supabase.from('usuarios_codigos').select('id').limit(1);
        const statusEl = document.getElementById('status-db');
        if (error) {
            statusEl.innerText = '❌ Error de BD';
            statusEl.style.color = '#e74c3c';
        } else {
            statusEl.innerText = '✅ BD Conectada';
            cargarCodigos();
            cargarFormatos();
        }
    }
    init();

    function openTab(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
    }

    // ==========================================
    // 3. GESTIÓN DE CÓDIGOS (RESTAURADA)
    // ==========================================
    function generarCodigoRandom() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = 'DOC-';
        for (let i = 0; i < 6; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('nuevo-codigo').value = result;
    }

    async function cargarCodigos() {
        const { data, error } = await supabase.from('usuarios_codigos').select('*').order('fecha_creacion', { ascending: false });
        const tbody = document.getElementById('tabla-codigos');
        if (error) return tbody.innerHTML = `<tr><td colspan="4" style="color: red;">Error</td></tr>`;
        
        tbody.innerHTML = '';
        data.forEach(row => {
            const fecha = new Date(row.fecha_creacion).toLocaleDateString('es-PE', { day: '2-digit', month: '2-digit', year: 'numeric' });
            tbody.innerHTML += `
                <tr>
                    <td><strong style="color: #9b59b6;">${row.codigo}</strong></td>
                    <td><span style="background: #2ecc71; color: #000; padding: 4px 10px; border-radius: 12px; font-weight: bold;">${row.creditos}</span></td>
                    <td>${fecha}</td>
                    <td>
                        <button class="btn-success" style="padding: 5px 10px;" onclick="recargarCodigo(${row.id}, ${row.creditos}, '${row.codigo}')">🔋</button>
                        <button class="btn-primary" style="padding: 5px 10px; background: #3498db;" onclick="compartirCodigo('${row.codigo}')">📤</button>
                        <button class="btn-danger" style="padding: 5px 10px;" onclick="eliminarCodigo(${row.id}, '${row.codigo}')">🗑️</button>
                    </td>
                </tr>
            `;
        });
    }

    async function crearCodigo() {
        const codigo = document.getElementById('nuevo-codigo').value.trim().toUpperCase();
        const creditos = parseInt(document.getElementById('nuevo-creditos').value);
        if (!codigo || isNaN(creditos)) return alert("Datos incompletos");
        const { error } = await supabase.from('usuarios_codigos').insert([{ codigo, creditos }]);
        if (error) alert("Error: " + error.message);
        else { cargarCodigos(); document.getElementById('nuevo-codigo').value = ''; }
    }

    async function recargarCodigo(id, actual, codigo) {
        const extra = prompt(`¿Cuántos créditos quieres sumar al código ${codigo}?`, "5");
        if (!extra || isNaN(extra)) return;
        const nuevoTotal = actual + parseInt(extra);
        const { error } = await supabase.from('usuarios_codigos').update({ creditos: nuevoTotal }).eq('id', id);
        if (error) alert("Error"); else cargarCodigos();
    }

    function compartirCodigo(codigo) {
        const msg = `Hola! Aquí tienes tu código para DocuFácil: *${codigo}*. Úsalo para generar tus documentos.`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg )}`, '_blank');
    }

    async function eliminarCodigo(id, codigo) {
        if (!confirm(`¿Eliminar ${codigo}?`)) return;
        await supabase.from('usuarios_codigos').delete().eq('id', id);
        cargarCodigos();
    }


    // ==========================================
    // 4. ARQUITECTO DE FORMATOS (MOTOR VISUAL)
    // ==========================================
    let currentFileBase64 = null;
    let currentFileType = null;
    let areasMarcadas = [];
    let isDrawing = false;
    let startX, startY, tempRect = null;

    const mainCanvas = document.getElementById('main-canvas');
    const drawCanvas = document.getElementById('draw-canvas');
    const ctxDraw = drawCanvas.getContext('2d');

    document.getElementById('file-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (event) => {
            currentFileBase64 = event.target.result;
            document.getElementById('msg-vacio').style.display = 'none';
            document.getElementById('canvas-wrapper').style.display = 'block';
            document.getElementById('config-areas').style.display = 'block';
            
            if (file.type === 'application/pdf') {
                currentFileType = 'pdf';
                renderPDF(event.target.result);
            } else {
                currentFileType = 'image';
                renderImage(event.target.result);
            }
        };
        reader.readAsDataURL(file);
    });

    async function renderPDF(dataUrl) {
        // Corregido: Referencia directa a pdfjsLib
        const loadingTask = pdfjsLib.getDocument({ data: atob(dataUrl.split(',')[1]) });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1.5 });
        
        setupCanvases(viewport.width, viewport.height);
        const ctx = mainCanvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    }

    function renderImage(dataUrl) {
        const img = new Image();
        img.onload = () => {
            let w = img.width, h = img.height;
            if (w > 800) { h = h * (800 / w); w = 800; }
            setupCanvases(w, h);
            mainCanvas.getContext('2d').drawImage(img, 0, 0, w, h);
        };
        img.src = dataUrl;
    }

    function setupCanvases(w, h) {
        mainCanvas.width = drawCanvas.width = w;
        mainCanvas.height = drawCanvas.height = h;
        // No limpiamos áreasMarcadas aquí para permitir la edición
        redibujarAreas();
    }

    // --- DIBUJO DE RECTÁNGULOS ---
    drawCanvas.onmousedown = (e) => {
        isDrawing = true;
        const rect = drawCanvas.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
    };

    drawCanvas.onmousemove = (e) => {
        if (!isDrawing) return;
        const rect = drawCanvas.getBoundingClientRect();
        const curX = e.clientX - rect.left;
        const curY = e.clientY - rect.top;
        tempRect = { x: Math.min(startX, curX), y: Math.min(startY, curY), w: Math.abs(curX - startX), h: Math.abs(curY - startY) };
        redibujarAreas();
        ctxDraw.strokeStyle = '#2ecc71';
        ctxDraw.lineWidth = 2;
        ctxDraw.strokeRect(tempRect.x, tempRect.y, tempRect.w, tempRect.h);
    };

    drawCanvas.onmouseup = () => {
        if (!isDrawing) return;
        isDrawing = false;
        if (tempRect && tempRect.w > 10) document.getElementById('modal-area').style.display = 'flex';
    };

    function confirmarArea() {
        const sel = document.getElementById('select-tipo-area');
        areasMarcadas.push({ ...tempRect, tipo: sel.value, nombre: sel.options[sel.selectedIndex].text });
        cancelarArea();
        actualizarListaAreas();
    }

    function cancelarArea() {
        document.getElementById('modal-area').style.display = 'none';
        tempRect = null;
        redibujarAreas();
    }

    function redibujarAreas() {
        ctxDraw.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        areasMarcadas.forEach(a => {
            ctxDraw.strokeStyle = '#9b59b6';
            ctxDraw.lineWidth = 2;
            ctxDraw.strokeRect(a.x, a.y, a.w, a.h);
            ctxDraw.fillStyle = 'rgba(155, 89, 182, 0.2)';
            ctxDraw.fillRect(a.x, a.y, a.w, a.h);
            ctxDraw.fillStyle = '#fff';
            ctxDraw.font = "12px Arial";
            ctxDraw.fillText(a.nombre, a.x + 5, a.y + 15);
        });
    }

    function actualizarListaAreas() {
        const lista = document.getElementById('lista-areas');
        lista.innerHTML = areasMarcadas.map((a, i) => `
            <li style="background:#2c3e50; padding:8px; border-radius:4px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:12px;">${a.nombre}</span>
                <button onclick="areasMarcadas.splice(${i},1); redibujarAreas(); actualizarListaAreas();" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-weight:bold;">✖</button>
            </li>
        `).join('');
    }

    // ==========================================
    // 5. GUARDAR Y CARGAR FORMATOS
    // ==========================================
    async function guardarFormato() {
        const nombre = document.getElementById('fmt-nombre').value.trim();
        const categoria = document.getElementById('fmt-categoria').value;
        if (!nombre || !currentFileBase64 || areasMarcadas.length === 0) return alert("Faltan datos (Nombre, Archivo o Áreas)");

        const { error } = await supabase.from('plantillas').insert([{
            nombre, 
            tipo: 'inteligente', 
            descripcion: categoria,
            configuracion: { fondo: currentFileBase64, tipoFondo: currentFileType, areas: areasMarcadas }
        }]);

        if (error) alert("Error al guardar: " + error.message);
        else { alert("✅ Formato guardado correctamente"); location.reload(); }
    }

    async function cargarFormatos() {
        // Corregido: Quitamos el filtro estricto para ver todo
        const { data, error } = await supabase.from('plantillas').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('formatos-container');
        if (error) return container.innerHTML = '<p style="color:red;">Error al cargar.</p>';
        
        if (!data || data.length === 0) {
            container.innerHTML = '<p style="color:#888;">No hay formatos creados aún.</p>';
            return;
        }
        
        container.innerHTML = data.map(f => `
            <div class="formato-card">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <h3>${f.nombre}</h3>
                    <span style="font-size:10px; background:#444; padding:2px 5px; border-radius:4px;">${f.tipo}</span>
                </div>
                <p style="font-size:12px; color:#aaa; margin: 5px 0;">Categoría: ${f.descripcion || 'Sin categoría'}</p>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button class="btn-primary" style="flex:1; padding:8px; font-size:12px;" onclick="editarFormato(${f.id})">✏️ Editar</button>
                    <button class="btn-danger" style="flex:1; padding:8px; font-size:12px;" onclick="borrarFormato(${f.id})">🗑️ Borrar</button>
                </div>
            </div>
        `).join('');
    }

    async function editarFormato(id) {
        const { data, error } = await supabase.from('plantillas').select('*').eq('id', id).single();
        if (error || !data) return alert("No se pudo cargar el formato.");

        // Cambiar a la pestaña de creador
        openTab('tab-creador', document.querySelectorAll('.tab-btn')[2]);
        
        // Llenar datos básicos
        document.getElementById('fmt-nombre').value = data.nombre;
        document.getElementById('fmt-categoria').value = data.descripcion || 'carta';
        
        // Cargar configuración
        if (data.configuracion) {
            currentFileBase64 = data.configuracion.fondo;
            currentFileType = data.configuracion.tipoFondo;
            areasMarcadas = data.configuracion.areas || [];
            
            document.getElementById('msg-vacio').style.display = 'none';
            document.getElementById('canvas-wrapper').style.display = 'block';
            document.getElementById('config-areas').style.display = 'block';
            
            if (currentFileType === 'pdf') renderPDF(currentFileBase64);
            else renderImage(currentFileBase64);
            
            actualizarListaAreas();
        }
    }

    async function borrarFormato(id) {
        if (confirm("¿Estás seguro de borrar este formato?")) {
            const { error } = await supabase.from('plantillas').delete().eq('id', id);
            if (error) alert("Error"); else cargarFormatos();
        }
    }
</script>
